  <script type="text/plain" id="markdown-source"># Digital Employee API 接口文档

本文档描述 **digital_employee** 用户端前端对接的两套后端能力：

1. **Hermes WebUI API Service**（本仓库 `nesquena-hermes-webui`）— 会话、对话流、定时任务、技能工坊、记忆、文件等
2. **NocoBase**（`https://www.foxuai.com`）— 用户登录注册、智能体绑定、通讯录、人才市场、用量追踪、邮箱账号等

> 事实源顺序：本仓库以 `api/routes_dispatcher.py` 和对应 handler 为准；NocoBase 以 `digital_employee/src/api/nocobase.js` 和实际 Network 请求为准。本文档不写入密码、token、cookie、API key 等敏感信息。

**最后更新：** 2026-06-26

> **文档范围**：覆盖 NocoBase 与 Hermes WebUI 主链路。RustMailer（`/rustmailer/*`）与 `scheduledTasks.js` 本地 task board 状态不在本文档范围内；详见 `digital_employee/src/api/agent.md`。

---

## 架构与代理

```text
digital_employee Vue 前端
  ├─ /hermes/*   → Caddy/Vite proxy → Hermes WebUI :8787 → 本仓库 /api/*
  └─ /nocobase/* → Caddy/Vite proxy → https://www.foxuai.com/api/*
```

| 层级 | 前端前缀 | 服务路由 | 职责 |
|------|----------|----------|------|
| Hermes WebUI | `/hermes/api/*` | `/api/*` | 会话、聊天流、cron、技能工坊写操作、记忆、上传 |
| NocoBase | `/nocobase/api/*` | `/api/*` | 用户态业务表、workflow、附件上传 |

- 登录身份来源是 **NocoBase**，不是 Hermes WebUI。
- Hermes 业务请求在 NocoBase 登录成功后，通过 `POST /hermes/api/auth/token-login` 建立 `hermes_session` HttpOnly cookie。
- 用户 ID 来自登录响应 `data.id`，前端写入 `localStorage`（`digital_employee.userId`）和 cookie（`X-User-Id`）。

---

## 通用约定

### Hermes WebUI 请求

| 项 | 约定 |
|----|------|
| 实现 | `digital_employee/src/api/hermes.js` → `hermesFetch()` |
| URL | `{VITE_HERMES_PROXY_PATH \|\| '/hermes'}/api/...` |
| Cookie | `credentials: 'include'`，携带 `hermes_session` |
| 用户上下文 | Header `X-User-Id: <data.id>`（部分接口必填） |
| CSRF | `POST`/`PATCH`/`DELETE` 需同源 Origin/Referer |
| SSE | `EventSource(url, { withCredentials: true })`，无法自定义 header，依赖 cookie |

### NocoBase 请求

| 项 | 约定 |
|----|------|
| 实现 | `digital_employee/src/api/nocobase.js` |
| URL | `{VITE_NOCOBASE_PROXY_PATH \|\| '/nocobase'}/api/...` |
| Cookie | `credentials: 'include'` |
| 用户上下文 | Header `X-User-Id: <data.id>` |
| 固定 Header | `X-Hostname: www.foxuai.com`、`X-Authenticator: basic` |
| Authorization | 由代理层（Vite/Caddy）从 `FOXUAI_NOCOBASE_AUTHORIZATION` 注入，不进前端 bundle |
| Workflow 响应 | 通常有外层 `{ code, message, data }` wrapper |

### Hermes 鉴权要点

| 机制 | 说明 |
|------|------|
| `hermes_session` | 密码或 token 登录后写入的 HttpOnly cookie |
| 公开路径 | `/health`、`/api/auth/status`、`/api/auth/login`、`/api/auth/token-login` 等 |
| `X-User-Id` | 用户上下文，**不是**可信鉴权凭证；`/api/user-ai-providers*`、`/api/user-skills*` 等必填 |
| `hermes_profile` cookie | 当前激活的 Hermes Profile，由 `POST /api/profile/switch` 设置 |

---

## NocoBase 接口

所有路径均通过 `/nocobase` 前缀访问。完整 URL 示例：`/nocobase/api/hermes_profiles:list`。

### 认证与注册

#### 用户登录

| 项 | 值 |
|----|-----|
| **路径** | `POST /nocobase/api/webhook:trigger/ugyoa0123ft` |
| **Workflow** | Hermes登录 (`ugyoa0123ft`) |
| **Helper** | `loginWithHermes()` |
| **页面** | `Login.vue` |

请求体：

```json
{
  "email": "user@example.com",
  "password": "<base64(encodeURIComponent(password))>"
}
```

成功响应示例：

```json
{
  "code": "200",
  "message": "登录成功",
  "data": {
    "id": 1001,
    "name": "example_user",
    "role": "用户",
    "email": "user@example.com",
    "department": "",
    "avatar_url": null
  }
}
```

- 前端以 `data.id` 作为当前用户 ID。
- 登录成功后继续调用 Hermes `token-login` 建立 WebUI 会话。

#### 用户注册

| 项 | 值 |
|----|-----|
| **路径** | `POST /nocobase/api/webhook:trigger/3ahenbutb7a` |
| **Workflow** | Register (`3ahenbutb7a`) |
| **Helper** | `registerWithHermes()` |
| **页面** | `Register.vue` |

请求体：`{ name, email, password }`（密码明文，由 workflow 处理）

成功时 `code === "200"`。

### 智能体 Profile

用户绑定的智能体数据存储在 NocoBase `hermes_profiles` 表；创建/更新/删除通过 workflow 编排，并同步 WebUI Profile 目录。

> 对话侧栏「我的智能体」**主读源**是 NocoBase `hermes_profiles:list`，不是 Hermes `GET /api/profiles`。

#### 列出当前用户智能体

| 项 | 值 |
|----|-----|
| **路径** | `GET /nocobase/api/hermes_profiles:list` |
| **Collection** | `hermes_profiles` |
| **Helper** | `listCurrentUserHermesProfiles()`、`listCurrentUserManagedHermesAgents()`、`listCurrentUserHermesProfilesWithTalentMarket()` |

查询参数：

| 参数 | 说明 |
|------|------|
| `paginate=false` | 不分页 |
| `filter[user_id]=<currentUserId>` | 按当前用户过滤 |
| `appends=hermes_skills` | 可选，附带已绑定技能 |
| `appends=hermes_talent_market` | 可选，招募场景附带人才市场来源 |

响应 `data[]` 主要字段：`id`、`profile_name`、`display_name`、`soul`、`description`、`path`、`hermes_providers_id`、`hermes_skills`。

前端归一化为 `{ active, profiles }` 供聊天侧栏和智能体管理使用。

| Helper | 场景 |
|--------|------|

### 对话与流式

典型聊天流程：

```text
1. POST /api/session/new        → 获得 session_id
2. POST /api/chat/start         → 获得 stream_id
3. GET  /api/chat/stream        → SSE 订阅事件
4. GET  /api/chat/cancel        → 可选，取消流
```

#### 启动对话

| 项 | 值 |
|----|-----|
| **路径** | `POST /api/chat/start` |
| **Body** | `{ session_id, message, attachments?, workspace?, model?, model_provider?, profile? }` |
| **响应** | `{ stream_id, session_id, pending_started_at, effective_model?, effective_model_provider? }` |

#### SSE 事件流

| 项 | 值 |
|----|-----|
| **路径** | `GET /api/chat/stream?stream_id=<id>` |
| **格式** | Server-Sent Events |
| **Cookie** | `withCredentials: true` |

常见事件（与 `streaming.py` / `openHermesStream()` 一致）：

| 事件 | 说明 |
|------|------|
| `token` | 模型输出 token，`{ text }` |
| `reasoning` | 推理内容，`{ text }` |
| `tool` | 工具开始，`{ event_type, name, preview, args }` |
| `tool_complete` | 工具完成 |
| `clarify` | 需要用户澄清 |
| `metering` | 用量统计 tick |
| `compressing` / `compressed` | 上下文压缩 |
| `done` | 单轮完成 |
| `stream_end` | 流结束 |
| `cancel` | 取消 |
| `warning` | 警告 |
| `apperror` | 应用错误 |

#### 其他

| 方法 | 路径 | 说明 |
|------|------|------|
| GET | `/api/chat/stream/status` | 检查流是否存活 |
| GET | `/api/chat/cancel` | 取消当前流 |
| POST | `/api/chat` | 同步对话（非流式兜底） |
| POST | `/api/btw` | 旁路追问 |
| POST | `/api/background` | 后台任务 |
| GET | `/api/background/status` | 后台任务结果 |

#### 当前激活 Profile

#### 按 Profile 路径读写

| 方法 | 路径 | 说明 |
|------|------|------|
| GET | `/api/profile/memory` | 读 MEMORY.md；`?path=` |
| POST | `/api/profile/memory` | 写 MEMORY.md；`{ path, content }` |
| GET | `/api/profile/user` | 读 USER.md；`?path=` |
| POST | `/api/profile/user` | 写 USER.md；`{ path, content }` |
| GET | `/api/profile/soul` | 读 SOUL.md；`?path=` |
| POST | `/api/profile/soul` | 写 SOUL.md；`{ path, content }`（`updateHermesProfileFile({ type: 'soul' })`） |

`path` 接受 Hermes root 或 `profiles/` 下的目录路径，例如 `/.hermes/profiles/agent-xxx`。

- 读取时文件不存在返回 `content: ""`
- 写入为**整文件覆盖**，非追加
- 只允许 Hermes profile 目录，禁止任意系统路径

| 状态码 / code | 场景 | 前端提示 |
|---------------|------|----------|

  <script>
    const TOC_STATE_KEY = 'api-docs-toc-expanded';

    marked.setOptions({
      gfm: true,
      breaks: false,
      mangle: false,
      headerIds: false
    });

    function headingText(heading) {
      const clone = heading.cloneNode(true);
      clone.querySelectorAll('.heading-anchor').forEach((el) => el.remove());
      return clone.textContent.replace(/\s+/g, ' ').trim();
    }

    function slugify(text) {
      return text
        .trim()
        .toLowerCase()
        .replace(/[\/\\]/g, ' ')
        .replace(/[^\w\u4e00-\u9fff\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    /** Escape unescaped pipe characters inside inline code within table rows. */
    function preprocessMarkdown(md) {
      const lines = md.split('\n');
      let inTable = false;

      return lines.map((line) => {
        const trimmed = line.trim();

        if (!trimmed.startsWith('|')) {
          inTable = false;
          return line;
        }

        if (/^\|[\s\-:|]+\|$/.test(trimmed)) {
          inTable = true;
          return line;
        }

        if (!inTable) return line;

        return line.replace(/`([^`\\]*(?:\\.[^`\\]*)*)`/g, (match, code) => {
          const escaped = code.replace(/(?<!\\)\|/g, '\\|');
          return '`' + escaped + '`';
        });
      }).join('\n');
    }

    function ensureHeadingIds(container) {
      const used = new Set();
      container.querySelectorAll('h2, h3, h4').forEach((heading) => {
        if (heading.id) {
          used.add(heading.id);
          return;
        }
        const base = slugify(heading.textContent);
        let id = base;
        let suffix = 2;
        while (used.has(id)) {
          id = base + '-' + suffix++;
        }
        heading.id = id;
        used.add(id);
      });
    }

    function addHeadingAnchors(container) {
      container.querySelectorAll('h2, h3, h4').forEach((heading) => {
        if (heading.querySelector('.heading-anchor')) return;
        heading.classList.add('has-anchor');
        const anchor = document.createElement('a');
        anchor.className = 'heading-anchor';
        anchor.href = '#' + heading.id;
        anchor.setAttribute('aria-label', '链接到此标题');
        anchor.textContent = '#';
        anchor.addEventListener('click', (e) => {
          e.preventDefault();
          history.replaceState(null, '', '#' + heading.id);
          heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        heading.appendChild(anchor);
      });
    }

    function wrapTables(container) {
      container.querySelectorAll('table').forEach((table) => {
        if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;
        const wrap = document.createElement('div');
        wrap.className = 'table-scroll';
        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
      });
    }

    function wrapSections(container) {
      const children = [...container.children];
      const h2List = children.filter((el) => el.tagName === 'H2');
      if (!h2List.length) return;

      h2List.forEach((h2) => {
        const section = document.createElement('section');
        section.className = 'doc-section';
        section.id = 'section-' + h2.id;
        h2.parentNode.insertBefore(section, h2);

        let node = h2;
        while (node) {
          const next = node.nextElementSibling;
          section.appendChild(node);
          if (next && next.tagName === 'H2') break;
          node = next;
        }
      });
    }

    function loadTocState() {
      try {
        const raw = localStorage.getItem(TOC_STATE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function saveTocState(state) {
      try {
        localStorage.setItem(TOC_STATE_KEY, JSON.stringify(state));
      } catch { /* ignore quota errors */ }
    }

    function buildToc(container) {
      ensureHeadingIds(container);

      const h2s = [...container.querySelectorAll('h2')];
      const toc = document.getElementById('toc');
      const sidebar = document.getElementById('sidebar');
      toc.innerHTML = '';

      if (!h2s.length) return;

      const saved = loadTocState();

      h2s.forEach((h2) => {
        const section = document.createElement('li');
        section.className = 'toc-section';
        section.dataset.sectionId = h2.id;

        const h3s = [];
        let el = h2.nextElementSibling;
        while (el && el.tagName !== 'H2') {
          if (el.tagName === 'H3') h3s.push(el);
          el = el.nextElementSibling;
        }

        if (!h3s.length) section.classList.add('is-leaf');

        const expanded = saved[h2.id] !== undefined ? saved[h2.id] : h3s.length > 0;
        if (expanded) section.classList.add('is-expanded');

        const head = document.createElement('div');
        head.className = 'toc-section-head';

        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'toc-toggle';
        toggle.setAttribute('aria-label', expanded ? '折叠章节' : '展开章节');
        toggle.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5l8 7-8 7z"/></svg>';

        const h2Link = document.createElement('a');
        h2Link.className = 'toc-h2-link';
        h2Link.href = '#' + h2.id;
        h2Link.textContent = headingText(h2);

        head.appendChild(toggle);
        head.appendChild(h2Link);
        section.appendChild(head);

        if (h3s.length) {
          const childList = document.createElement('ul');
          childList.className = 'toc-children';

          h3s.forEach((h3) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#' + h3.id;
            a.textContent = headingText(h3);
            li.appendChild(a);
            childList.appendChild(li);
          });

          section.appendChild(childList);
        }

        const persist = () => {
          const state = loadTocState();
          state[h2.id] = section.classList.contains('is-expanded');
          saveTocState(state);
        };

        toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          if (section.classList.contains('is-leaf')) return;
          section.classList.toggle('is-expanded');
          toggle.setAttribute('aria-label', section.classList.contains('is-expanded') ? '折叠章节' : '展开章节');
          persist();
        });

        h2Link.addEventListener('click', () => closeMobileSidebar());

        section.querySelectorAll('.toc-children a').forEach((a) => {
          a.addEventListener('click', () => closeMobileSidebar());
        });

        toc.appendChild(section);
      });

      sidebar.hidden = false;
      setupTocControls();
    }

    function setAllTocSections(expanded) {
      document.querySelectorAll('.toc-section:not(.is-leaf)').forEach((section) => {
        section.classList.toggle('is-expanded', expanded);
        const toggle = section.querySelector('.toc-toggle');
        if (toggle) {
          toggle.setAttribute('aria-label', expanded ? '折叠章节' : '展开章节');
        }
        const id = section.dataset.sectionId;
        if (id) {
          const state = loadTocState();
          state[id] = expanded;
          saveTocState(state);
        }
      });
    }

    function setupTocControls() {
      const search = document.getElementById('toc-search');
      search.addEventListener('input', () => {
        const q = search.value.trim().toLowerCase();
        document.querySelectorAll('.toc-section').forEach((section) => {
          const h2Text = section.querySelector('.toc-h2-link')?.textContent.toLowerCase() || '';
          const childTexts = [...section.querySelectorAll('.toc-children a')].map((a) => a.textContent.toLowerCase());
          const match = !q || h2Text.includes(q) || childTexts.some((t) => t.includes(q));
          section.classList.toggle('is-hidden', !match);
          if (match && q && childTexts.some((t) => t.includes(q))) {
            section.classList.add('is-expanded');
          }
        });
      });

      document.getElementById('toc-expand-all').addEventListener('click', () => setAllTocSections(true));
      document.getElementById('toc-collapse-all').addEventListener('click', () => setAllTocSections(false));
    }

    function setupScrollSpy() {
      const tocLinks = [...document.querySelectorAll('.toc-h2-link, .toc-children a')];
      const headingMap = new Map();

      tocLinks.forEach((link) => {
        const id = link.getAttribute('href').slice(1);
        const heading = document.getElementById(id);
        if (heading) headingMap.set(id, link);
      });

      const headings = [...headingMap.keys()]
        .map((id) => document.getElementById(id))
        .filter(Boolean)
        .sort((a, b) => a.offsetTop - b.offsetTop);

      const setActive = (id) => {
        tocLinks.forEach((link) => link.classList.remove('active'));
        const link = headingMap.get(id);
        if (link) {
          link.classList.add('active');
          const section = link.closest('.toc-section');
          if (section && link.classList.contains('toc-h2-link') === false) {
            section.classList.add('is-expanded');
            const state = loadTocState();
            const sectionId = section.dataset.sectionId;
            if (sectionId) {
              state[sectionId] = true;
              saveTocState(state);
            }
          }
        }
      };

      const observer = new IntersectionObserver(
        (entries) => {
          const visible = entries
            .filter((e) => e.isIntersecting)
            .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
          if (visible.length) {
            setActive(visible[0].target.id);
          }
        },
        { rootMargin: '-88px 0px -60% 0px', threshold: [0, 0.1, 0.5] }
      );

      headings.forEach((h) => observer.observe(h));

      if (location.hash) {
        const id = location.hash.slice(1);
        if (headingMap.has(id)) setActive(id);
      }
    }

    function openMobileSidebar() {
      document.getElementById('sidebar').classList.add('is-open');
      const backdrop = document.getElementById('sidebar-backdrop');
      backdrop.hidden = false;
      backdrop.classList.add('is-visible');
    }

    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('is-open');
      const backdrop = document.getElementById('sidebar-backdrop');
      backdrop.classList.remove('is-visible');
      backdrop.hidden = true;
    }

    function extractUpdatedAt(md) {
      const match = md.match(/\*\*最后更新：\*\*\s*(\S+)/);
      if (match) {
        document.getElementById('updated-at').textContent = '更新于 ' + match[1];
      }
    }

    function showError(message, hint) {
      document.getElementById('loading').hidden = true;
      const panel = document.getElementById('error');
      panel.hidden = false;
      panel.innerHTML =
        '<p><strong>无法加载文档</strong></p><p>' + message + '</p>' +
        (hint ? '<div class="hint">' + hint + '</div>' : '');
    }

    function upgradeMermaidBlocks(container) {
      const blocks = [...container.querySelectorAll('pre > code[class*="mermaid"]')];
      blocks.forEach((code) => {
        const pre = code.parentElement;
        if (!pre) return;
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent.trim();
        pre.replaceWith(div);
      });
      return blocks.length;
    }

    async function renderMermaidDiagrams(container) {
      const count = upgradeMermaidBlocks(container);
      if (!count) return;

      if (typeof mermaid === 'undefined') {
        container.querySelectorAll('.mermaid').forEach((node) => {
          const pre = document.createElement('pre');
          pre.className = 'mermaid-fallback';
          pre.textContent = node.textContent;
          node.replaceWith(pre);
        });
        return;
      }

      mermaid.initialize({
        startOnLoad: false,
        theme: 'neutral',
        securityLevel: 'loose',
        flowchart: { htmlLabels: true, curve: 'basis' },
      });

      try {
        await mermaid.run({ nodes: container.querySelectorAll('.mermaid'), suppressErrors: false });
      } catch (err) {
        console.error('Mermaid render failed:', err);
        container.querySelectorAll('.mermaid').forEach((node) => {
          const pre = document.createElement('pre');
          pre.className = 'mermaid-fallback';
          pre.textContent = node.textContent;
          node.replaceWith(pre);
        });
      }
    }

    async function renderMarkdown(md) {
      document.getElementById('loading').hidden = true;
      extractUpdatedAt(md);

      const processed = preprocessMarkdown(md);
      const body = document.getElementById('markdown-body');
      body.innerHTML = marked.parse(processed);

      wrapTables(body);
      ensureHeadingIds(body);
      addHeadingAnchors(body);
      wrapSections(body);
      await renderMermaidDiagrams(body);
      buildToc(body);
      setupScrollSpy();
    }

    async function loadMarkdown() {
      const source = document.getElementById('markdown-source');
      if (!source) {
        showError('未找到内嵌文档内容');
        return;
      }
      const md = source.textContent;
      if (!md.trim()) {
        showError('文档内容为空');
        return;
      }
      try {
        await renderMarkdown(md);
      } catch (err) {
        showError(err.message || String(err));
      }
    }

    document.getElementById('sidebar-open').addEventListener('click', openMobileSidebar);
    document.getElementById('sidebar-close').addEventListener('click', closeMobileSidebar);
    document.getElementById('sidebar-backdrop').addEventListener('click', closeMobileSidebar);

    loadMarkdown();
  </script>
